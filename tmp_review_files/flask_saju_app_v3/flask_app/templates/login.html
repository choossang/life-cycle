<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>나의 사주 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:"Malgun Gothic",sans-serif}
.box{background:#111820;border:1px solid #2a3040;border-radius:16px;padding:40px 36px;width:320px;text-align:center}
h2{color:#7ec8e3;margin-bottom:8px;font-size:20px}
p{color:#555;font-size:12px;margin-bottom:28px}
input{width:100%;background:#0a0e1a;border:1px solid #2a3040;color:#fff;padding:12px;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none}
input:focus{border-color:#7ec8e3}
button{width:100%;background:#7ec8e3;color:#0a0e1a;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:bold;cursor:pointer}
button:hover{background:#5ab8d8}
.err{color:#ff6b6b;font-size:12px;margin-top:10px}
</style>
</head>
<body>
<div class="box">
  <h2>🔮 나의 사주 시스템</h2>
  <p>丙辰日柱 · 신강(身强) 丙火</p>
  <form method="POST">
    <input type="password" name="pw" placeholder="비밀번호 입력" autofocus>
    <button type="submit">입장</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
</div>
</body>
</html>
